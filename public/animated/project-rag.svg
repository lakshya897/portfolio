<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460" />
      <stop offset="100%" stop-color="#0a192f" />
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <rect width="520" height="300" rx="16" fill="url(#bg3)" />
  
  <!-- Document stack -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="100" height="140" rx="8" fill="#1e40af" opacity="0.4" />
    <rect x="10" y="10" width="100" height="140" rx="8" fill="#3b82f6" opacity="0.5" />
    <rect x="20" y="20" width="100" height="140" rx="8" fill="#60a5fa" opacity="0.6" />
    <rect x="30" y="30" width="100" height="140" rx="8" fill="#93c5fd" opacity="0.7" />
    
    <!-- Document lines -->
    <g fill="#1e3a8a" opacity="0.5">
      <rect x="45" y="50" width="70" height="8" rx="4" />
      <rect x="45" y="70" width="60" height="6" rx="3" />
      <rect x="45" y="85" width="65" height="6" rx="3" />
      <rect x="45" y="100" width="55" height="6" rx="3" />
      <rect x="45" y="115" width="70" height="6" rx="3" />
      <rect x="45" y="130" width="50" height="6" rx="3" />
    </g>
  </g>

  <!-- Vector database (hexagon) -->
  <g transform="translate(380, 80)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="#06b6d4" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite" />
    </polygon>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#06b6d4" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2s" repeatCount="indefinite" begin="0.3s" />
    </polygon>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#67e8f9" />
    <text y="6" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="bold">DB</text>
  </g>

  <!-- LLM brain -->
  <g transform="translate(260, 150)">
    <circle r="50" fill="#10b981" opacity="0.2">
      <animate attributeName="r" values="50;60;50" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.1;0.2" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle r="40" fill="#10b981" opacity="0.4">
      <animate attributeName="r" values="40;45;40" dur="2.5s" repeatCount="indefinite" begin="0.4s" />
    </circle>
    <circle r="30" fill="#34d399" />
    <text y="8" text-anchor="middle" fill="#0f172a" font-size="24">🧠</text>
  </g>

  <!-- Query flow arrows -->
  <g stroke="url(#grad3)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- From docs to LLM -->
    <path d="M180 120 Q220 100 230 130">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="1.5s" repeatCount="indefinite" />
    </path>
    <!-- From DB to LLM -->
    <path d="M350 120 Q310 100 290 130">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="1.5s" repeatCount="indefinite" begin="0.5s" />
    </path>
    <!-- From LLM to answer -->
    <path d="M260 200 Q260 230 260 250">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1.5s" repeatCount="indefinite" begin="1s" />
    </path>
  </g>

  <!-- Query bubble -->
  <g transform="translate(260, 260)">
    <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#10b981" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite" />
    </rect>
    <text y="5" text-anchor="middle" fill="white" font-size="12" font-weight="600">Answer Found</text>
  </g>

  <!-- Speed badge -->
  <rect x="30" y="240" width="100" height="36" rx="18" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.6s" repeatCount="indefinite" />
  </rect>
  <text x="80" y="263" text-anchor="middle" fill="white" font-size="13" font-weight="600">30% Faster</text>

  <!-- Accuracy badge -->
  <rect x="390" y="240" width="100" height="36" rx="18" fill="#10b981" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite" />
  </rect>
  <text x="440" y="263" text-anchor="middle" fill="white" font-size="13" font-weight="600">15% Better</text>
</svg>
