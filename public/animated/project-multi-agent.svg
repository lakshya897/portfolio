<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <rect width="520" height="300" rx="16" fill="url(#bg2)" />
  
  <!-- Network background -->
  <g stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2">
    <line x1="100" y1="80" x2="260" y2="150" />
    <line x1="260" y1="150" x2="420" y2="80" />
    <line x1="100" y1="80" x2="420" y2="80" />
    <line x1="100" y1="220" x2="260" y2="150" />
    <line x1="260" y1="150" x2="420" y2="220" />
    <line x1="100" y1="220" x2="420" y2="220" />
    <line x1="100" y1="80" x2="100" y2="220" />
    <line x1="420" y1="80" x2="420" y2="220" />
  </g>

  <!-- Central hub (main agent) -->
  <g transform="translate(260, 150)">
    <circle r="45" fill="#8b5cf6" opacity="0.3">
      <animate attributeName="r" values="45;55;45" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle r="35" fill="#8b5cf6" opacity="0.5">
      <animate attributeName="r" values="35;40;35" dur="2s" repeatCount="indefinite" begin="0.3s" />
    </circle>
    <circle r="25" fill="#a78bfa" />
    <text y="8" text-anchor="middle" fill="white" font-size="20">🤖</text>
  </g>

  <!-- Agent nodes -->
  <g transform="translate(100, 80)">
    <circle r="28" fill="#ec4899" opacity="0.8">
      <animate attributeName="r" values="28;32;28" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <text y="6" text-anchor="middle" fill="white" font-size="16">🧠</text>
  </g>
  <g transform="translate(420, 80)">
    <circle r="28" fill="#06b6d4" opacity="0.8">
      <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite" />
    </circle>
    <text y="6" text-anchor="middle" fill="white" font-size="16">🔧</text>
  </g>
  <g transform="translate(100, 220)">
    <circle r="28" fill="#10b981" opacity="0.8">
      <animate attributeName="r" values="28;32;28" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <text y="6" text-anchor="middle" fill="white" font-size="16">📊</text>
  </g>
  <g transform="translate(420, 220)">
    <circle r="28" fill="#f59e0b" opacity="0.8">
      <animate attributeName="r" values="28;32;28" dur="1.9s" repeatCount="indefinite" />
    </circle>
    <text y="6" text-anchor="middle" fill="white" font-size="16">⚡</text>
  </g>

  <!-- Data flow particles -->
  <g fill="#a78bfa">
    <circle r="4">
      <animateMotion dur="2s" repeatCount="indefinite" path="M100 80 L260 150" />
    </circle>
    <circle r="4">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M420 80 L260 150" />
    </circle>
    <circle r="4">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M100 220 L260 150" />
    </circle>
    <circle r="4">
      <animateMotion dur="2.3s" repeatCount="indefinite" path="M420 220 L260 150" />
    </circle>
  </g>

  <!-- API integration badge -->
  <rect x="30" y="240" width="120" height="36" rx="18" fill="#8b5cf6" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <text x="90" y="263" text-anchor="middle" fill="white" font-size="13" font-weight="600">8+ APIs</text>

  <!-- Automation badge -->
  <rect x="370" y="240" width="120" height="36" rx="18" fill="#ec4899" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.7s" repeatCount="indefinite" />
  </rect>
  <text x="430" y="263" text-anchor="middle" fill="white" font-size="13" font-weight="600">Auto Execution</text>
</svg>
