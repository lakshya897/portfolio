<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <circle cx="210" cy="210" r="152" fill="none" stroke="url(#ring)" stroke-opacity="0.4" stroke-width="3" />
  <circle cx="210" cy="210" r="112" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2" />

  <g fill="#93c5fd">
    <circle cx="210" cy="58" r="8">
      <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="322" cy="210" r="9" fill="#a78bfa">
      <animateTransform attributeName="transform" type="rotate" from="360 210 210" to="0 210 210" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="210" cy="322" r="7" fill="#67e8f9">
      <animateTransform attributeName="transform" type="rotate" from="0 210 210" to="360 210 210" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-size="136" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#dbeafe">
    L
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite" />
  </text>
</svg>
