<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <rect width="520" height="300" rx="16" fill="url(#bg1)" />
  
  <!-- City buildings silhouette -->
  <g fill="#1e40af" opacity="0.3">
    <rect x="20" y="180" width="40" height="120" rx="4" />
    <rect x="70" y="140" width="50" height="160" rx="4" />
    <rect x="130" y="160" width="35" height="140" rx="4" />
    <rect x="175" y="120" width="60" height="180" rx="4" />
    <rect x="245" y="150" width="45" height="150" rx="4" />
    <rect x="300" y="100" width="55" height="200" rx="4" />
    <rect x="365" y="170" width="40" height="130" rx="4" />
    <rect x="415" y="130" width="50" height="170" rx="4" />
    <rect x="475" y="160" width="35" height="140" rx="4" />
  </g>

  <!-- Animated connection lines -->
  <g stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M60 80 Q150 60 260 80 Q370 100 460 80">
      <animate attributeName="d" values="M60 80 Q150 60 260 80 Q370 100 460 80;M60 80 Q150 100 260 80 Q370 60 460 80;M60 80 Q150 60 260 80 Q370 100 460 80" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M80 100 Q170 80 280 100 Q390 120 440 100">
      <animate attributeName="d" values="M80 100 Q170 80 280 100 Q390 120 440 100;M80 100 Q170 120 280 100 Q390 80 440 100;M80 100 Q170 80 280 100 Q390 120 440 100" dur="2.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Floating complaint icons -->
  <g>
    <circle cx="100" cy="60" r="20" fill="#3b82f6" opacity="0.8">
      <animate attributeName="cy" values="60;50;60" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="100" y="66" text-anchor="middle" fill="white" font-size="16">📋</text>
  </g>
  <g>
    <circle cx="260" cy="45" r="24" fill="#8b5cf6" opacity="0.8">
      <animate attributeName="cy" values="45;35;45" dur="2.3s" repeatCount="indefinite" />
    </circle>
    <text x="260" y="52" text-anchor="middle" fill="white" font-size="18">🏢</text>
  </g>
  <g>
    <circle cx="420" cy="55" r="22" fill="#06b6d4" opacity="0.8">
      <animate attributeName="cy" values="55;45;55" dur="2.1s" repeatCount="indefinite" />
    </circle>
    <text x="420" y="62" text-anchor="middle" fill="white" font-size="16">✅</text>
  </g>

  <!-- Processing indicator -->
  <g transform="translate(260, 200)">
    <circle r="40" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3">
      <animate attributeName="r" values="40;50;40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle r="30" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite" begin="0.3s" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite" begin="0.3s" />
    </circle>
    <text y="8" text-anchor="middle" fill="#bfdbfe" font-size="24" font-weight="bold">88%</text>
  </g>

  <!-- ML badge -->
  <rect x="380" y="240" width="100" height="36" rx="18" fill="#3b82f6" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <text x="430" y="263" text-anchor="middle" fill="white" font-size="14" font-weight="600">ML Routing</text>
</svg>
